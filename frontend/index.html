<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/assets/perplexity.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perplexity</title>
    <style>
      #root:empty + #initial-loader {
        display: flex;
      }
      #initial-loader {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 999;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #07090f;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      }
      .loader-logo {
        width: 80px;
        height: 80px;
        border-radius: 16px;
        margin-bottom: 32px;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        border: 2px solid rgba(49, 184, 198, 0.3);
      }
      .loader-title {
        color: white;
        font-size: 32px;
        font-weight: 600;
        margin-bottom: 24px;
        letter-spacing: -0.025em;
      }
      .loader-spinner-container {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px 16px;
        border-radius: 9999px;
        border: 1px solid #3b3d41;
        background-color: rgba(26, 28, 30, 0.6);
        backdrop-filter: blur(8px);
      }
      .loader-spinner {
        width: 18px;
        height: 18px;
        border: 2px solid rgba(49, 184, 198, 0.25);
        border-top-color: #31b8c6;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      .loader-text {
        color: #9ca3af;
        font-size: 14px;
        font-weight: 500;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="initial-loader">
      <img src="/assets/perplexity.png" alt="Loading..." class="loader-logo" />
      <h2 class="loader-title">perplexity</h2>
      <div class="loader-spinner-container">
        <div class="loader-spinner"></div>
        <span class="loader-text">Loading workspace...</span>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
